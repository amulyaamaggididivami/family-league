spring.application.name=family-league
server.port=9090

# ===================================================
# PostgreSQL Database Configuration
# ===================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/family-league
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================
# JPA / Hibernate Configuration
# ===================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================================================
# Prediction Lock Windows (hours)
# ===================================================
familyleague.prediction.match-lock-hours=1
familyleague.prediction.league-lock-hours=4

# ===================================================
# JWT Configuration
# ===================================================
# Secret must be a Base64-encoded string of at least 32 bytes (256 bits).
# CHANGE THIS in production — never commit the real secret.
familyleague.jwt.secret=
familyleague.jwt.expiration-ms=86400000

# ===================================================
# Email / SMTP Configuration
# ===================================================
# Replace with your SMTP provider details before running.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
familyleague.mail.from=noreply@familyleague.com
# Hours before match start time to send prediction reminder email
familyleague.notification.reminder-before-hours=2

# ===================================================
# Async Thread Pool
# ===================================================
familyleague.async.core-pool-size=4
familyleague.async.max-pool-size=8
familyleague.async.queue-capacity=100

# ===================================================
# OpenAPI / Swagger
# ===================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
# Sets sensible defaults for pageable params in Swagger UI
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# ===================================================
# Logging
# ===================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.name=logs/family-league.log
